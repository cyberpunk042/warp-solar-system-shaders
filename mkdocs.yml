site_name: Warp Shaders
site_description: A hyper-realistic procedural rendering engine for NVIDIA Warp.
site_url: https://cyberpunk042.github.io/warp-solar-system-shaders/
repo_url: https://github.com/cyberpunk042/warp-solar-system-shaders
repo_name: warp-solar-system-shaders
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - toc.follow
    - search.suggest

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Concepts: concepts.md
  - Guides:
      - Writing a scene: guides/writing-a-scene.md
      - Cinematics (camera paths, video, reel): guides/cinematics.md
  - API reference:
      - Overview: api/index.md
      - procedural: api/procedural.md
      - engine: api/engine.md
      - textures: api/textures.md
      - lod: api/lod.md
      - scene: api/scene.md
      - life (L-Systems): api/life.md
      - super-earth: api/superearth.md
      - cosmos (solar system): api/cosmos.md
      - subatomic (Standard Model): api/subatomic.md
      - molecules (chemistry): api/molecules.md
      - blast (nuclear): api/blast.md
      - buildings: api/buildings.md
  - Gallery: gallery.md
  - Research notes:
      - Foundations: research/00-foundations.md
      - Textures & LUTs: research/01-textures-and-luts.md
      - Atmosphere scattering: research/02-atmosphere-scattering.md
      - Volumetrics & god-rays: research/03-volumetrics-and-godrays.md
      - L-Systems (growing life): research/04-lsystems.md
      - Molecular to cell: research/05-molecular-to-cell.md
      - The mind: research/06-the-mind.md
      - Wave and collapse: research/07-wave-and-collapse.md
      - Ecosystem: research/08-ecosystem.md
      - Super-Earth: research/09-super-earth.md
      - The solar system: research/10-solar-system.md
      - Stellar evolution: research/11-stellar-evolution.md
      - Galaxy collisions: research/12-galaxy-collisions.md
      - 3D fractals: research/13-3d-fractals.md
      - KIFS fractals: research/14-kifs-fractals.md
      - Nuclear fireball: research/15-nuclear-fireball.md
      - A living world: research/16-a-living-world.md
      - Buildings: research/17-buildings.md
      - Nuke the city: research/18-nuke-the-city.md
      - Extraordinary cosmos: research/19-extraordinary-cosmos.md
      - More cosmos, worlds & cross-strand: research/20-more-cosmos-worlds-crossstrand.md
      - The Standard Model: research/21-standard-model.md
      - Chemistry & molecules: research/22-chemistry-and-molecules.md
      - Origin & large-scale universe: research/23-origin-and-large-scale-universe.md
      - The living body: research/24-the-living-body.md
      - Earth & weather: research/25-earth-and-weather.md
      - The machine (tech & computation): research/26-the-machine.md
      - Mathematics made visible: research/27-mathematics-made-visible.md
      - The deep ocean: research/28-the-deep-ocean.md
      - Megastructures & the far future: research/29-megastructures-and-far-future.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

# Build the site:
#   pip install -r docs/requirements.txt
#   mkdocs serve         # live preview at http://127.0.0.1:8000
#   mkdocs build         # static site into ./site
#
# The API pages are hand-authored Markdown so the site builds with no import of
# warp-lang. To auto-generate reference from docstrings instead, add the
# `mkdocstrings[python]` plugin and `::: warp_shaders.<module>` blocks.
